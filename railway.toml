[build]
builder = "NIXPACKS"
buildCommand = "npm install --include=dev && npx prisma generate --schema=apps/api/prisma/schema.prisma && npm run build --workspace=apps/api"

[deploy]
startCommand = "npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma && npm run start:prod --workspace=apps/api"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
