[build]
builder = "NIXPACKS"
buildCommand = "npm install --include=dev && npm run prisma:generate --workspace=apps/api && npm run build --workspace=apps/api"

[deploy]
startCommand = "npm run prisma:migrate:deploy --workspace=apps/api && npm run start:prod --workspace=apps/api"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
