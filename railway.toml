[build]
builder = "NIXPACKS"
buildCommand = "npm install --include=dev && npm run prisma:generate --workspace=apps/api && npm run build --workspace=apps/api"

[deploy]
startCommand = "echo '--- debug ls ---' && ls -la /app/apps/api && echo '--- dist? ---' && ls -la /app/apps/api/dist 2>&1 && npm run prisma:migrate:deploy --workspace=apps/api && npm run start:prod --workspace=apps/api"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
